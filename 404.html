<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>404 - Pagina Non Trovata | Parthenoweb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/Favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #02183b 0%, #043873 50%, #011029 100%);
            font-family: 'Concert One', cursive;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        .text {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            color: rgba(19, 36, 44, 0.23);
            font-size: 30em;
            text-align: center;
            z-index: 0;
            font-weight: 900;
            pointer-events: none;
        }

        .text p {
            margin: 0;
        }

        .container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 300px;
            width: 500px;
        }

        .container:after {
            position: absolute;
            content: "";
            background-color: rgba(19, 36, 44, 0.1);
            border-radius: 12px;
            bottom: 40px;
            height: 12px;
            left: 80px;
            width: 350px;
            z-index: -1;
        }

        .caveman {
            height: 300px;
            position: absolute;
            width: 250px;
        }

        .caveman:nth-child(1) {
            right: 20px;
        }

        .caveman:nth-child(2) {
            left: 20px;
            transform: rotateY(180deg);
        }

        .head {
            position: absolute;
            background-color: #13242C;
            border-radius: 50px;
            height: 140px;
            left: 60px;
            top: 25px;
            width: 65px;
            animation: head-anima 1.2s infinite cubic-bezier(0.55, 0.01, 0.16, 1.34);
        }

        .caveman:nth-child(1) .head {
            animation-delay: 0.6s;
        }

        .head:after,
        .head:before {
            content: "";
            position: absolute;
            background-color: #13242C;
            border-radius: 10px;
            height: 20px;
            width: 7px;
        }

        .head:after {
            left: 35px;
            top: -8px;
            transform: rotate(20deg);
        }

        .head:before {
            left: 30px;
            top: -8px;
            transform: rotate(-20deg);
        }

        .eye {
            position: absolute;
            background-color: #EAB08C;
            border-radius: 50px;
            height: 16px;
            left: 45%;
            top: 40px;
            width: 48px;
        }

        .eye:after,
        .eye:before {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: #13242C;
            border-radius: 50%;
            height: 5px;
            width: 5px;
            animation: eye-anima 1.2s infinite cubic-bezier(0.55, 0.01, 0.16, 1.34);
        }

        .caveman:nth-child(1) .eye:after,
        .caveman:nth-child(1) .eye:before {
            animation-delay: 0.6s;
        }

        .eye:after {
            left: 5px;
        }

        .eye:before {
            right: 9px;
        }

        .nose {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: #D9766C;
            border-left: 8px solid rgba(19, 36, 44, 0.1);
            border-radius: 10px;
            box-sizing: border-box;
            height: 35px;
            left: 45%;
            top: 12px;
            width: 15px;
        }

        .mouth {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background-color: rgba(19, 36, 44, 0.3);
        }

        .shape {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            height: 140px;
            overflow: hidden;
            top: 70px;
            width: 140px;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            height: 60px;
            width: 60px;
        }

        .circle:after,
        .circle:before {
            content: "";
            position: absolute;
            border-radius: 50%;
            height: 20px;
            width: 20px;
        }

        .circle:after {
            left: 50px;
            top: 10px;
        }

        .circle:before {
            left: 60px;
            top: 45px;
        }

        .circle:nth-child(1) {
            left: -12px;
            top: 80px;
        }

        .circle:nth-child(2) {
            right: 10px;
            top: 0px;
            transform: rotate(90deg);
        }

        .circle:nth-child(2):before {
            display: none;
        }

        .caveman:nth-child(1) .shape {
            background-color: #D13433;
        }

        .caveman:nth-child(1) .shape .circle {
            background-color: #932422;
        }

        .caveman:nth-child(1) .shape .circle:after,
        .caveman:nth-child(1) .shape .circle:before {
            background-color: #932422;
        }

        .caveman:nth-child(2) .shape {
            background-color: #932422;
        }

        .caveman:nth-child(2) .shape .circle {
            background-color: #D13433;
        }

        .caveman:nth-child(2) .shape .circle:after,
        .caveman:nth-child(2) .shape .circle:before {
            background-color: #D13433;
        }

        .arm-right {
            position: absolute;
            background-color: #EAB08C;
            border-left: 8px solid rgba(19, 36, 44, 0.1);
            border-radius: 50px;
            box-sizing: border-box;
            height: 180px;
            left: 135px;
            top: 80px;
            transform-origin: 30px 30px;
            width: 60px;
            z-index: 1;
            animation: arm-anima 1.2s infinite cubic-bezier(0.55, 0.01, 0.16, 1.34);
        }

        .caveman:nth-child(2) .arm-right {
            animation-delay: 0.6s;
        }

        .club {
            position: absolute;
            border-bottom: 110px solid #601513;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            height: 0;
            left: -60px;
            top: 120px;
            transform: rotate(70deg);
            width: 20px;
        }

        .club:after,
        .club:before {
            position: absolute;
            content: "";
            background-color: #601513;
            border-radius: 50%;
            left: 0;
        }

        .club:after {
            height: 20px;
            width: 20px;
            top: -10px;
        }

        .club:before {
            height: 40px;
            width: 40px;
            left: -10px;
            top: 90px;
        }

        .leg {
            position: absolute;
            border-radius: 10px;
            height: 55px;
            top: 200px;
            width: 10px;
        }

        .leg:after {
            position: absolute;
            content: "";
            border-radius: 50%;
            height: 10px;
            left: -5px;
            top: 15px;
            width: 10px;
        }

        .foot {
            position: absolute;
            border-radius: 25px 25px 0 0;
            height: 25px;
            left: -38px;
            top: 30px;
            width: 50px;
        }

        .foot:after,
        .foot:before,
        .foot .fingers,
        .foot .fingers:after {
            position: absolute;
            background-color: #EAB08C;
            border-radius: 50%;
            bottom: 0px;
            height: 15px;
            transform-origin: bottom;
            width: 15px;
        }

        .foot:after {
            left: -6px;
            content: "";
        }

        .foot:before {
            left: 8px;
            transform: scale(0.6);
            content: "";
        }

        .foot .fingers {
            left: 15px;
            transform: scale(0.6);
        }

        .foot .fingers:after {
            left: 11px;
            content: "";
        }

        .leg:nth-child(1) {
            background-color: #B2524D;
            left: 95px;
        }

        .leg:nth-child(1):after {
            background-color: #B2524D;
        }

        .leg:nth-child(1) .foot {
            background-color: #B2524D;
        }

        .leg:nth-child(1) .foot:after {
            background-color: #B2524D;
        }

        .leg:nth-child(1) .foot:before {
            display: none;
        }

        .leg:nth-child(2) {
            background-color: #D9766C;
            left: 115px;
        }

        .leg:nth-child(2):after {
            background-color: #D9766C;
        }

        .leg:nth-child(2) .foot {
            background-color: #D9766C;
        }

        @keyframes arm-anima {
            0% {
                transform: rotate(0);
            }

            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes head-anima {

            0%,
            42% {
                top: 25px;
            }

            45% {
                top: 50px;
            }

            100% {
                top: 25px;
            }
        }

        @keyframes eye-anima {

            0%,
            42% {
                height: 5px;
            }

            45% {
                height: 1px;
            }

            100% {
                height: 5px;
            }
        }

        .container:after {
            animation: shadow-anima 1.2s infinite cubic-bezier(0.55, 0.01, 0.16, 1.34);
            animation-delay: 0.1s;
        }

        @keyframes shadow-anima {
            0% {
                width: 350px;
                left: 80px;
            }

            25% {
                width: 450px;
                left: 80px;
            }

            50% {
                width: 350px;
                left: 80px;
            }

            75% {
                width: 450px;
                left: 0px;
            }

            100% {
                width: 350px;
                left: 80px;
            }
        }

        .error-message {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            width: 100%;
        }

        .error-message h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .error-message p {
            font-size: 1rem;
            font-weight: 500;
            margin: 0 0 1.5rem 0;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Inter', sans-serif;
        }

        .error-message .btn {
            display: inline-block;
            padding: 0.9rem 2.2rem;
            background: linear-gradient(135deg, #4FA3F7 0%, #2176d2 100%);
            border: 2px solid #4FA3F7;
            color: #ffffff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .error-message .btn:hover {
            background: linear-gradient(135deg, #2176d2 0%, #4FA3F7 100%);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 163, 247, 0.3);
        }
    </style>
</head>
