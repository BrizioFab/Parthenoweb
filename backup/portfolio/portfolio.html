
{% extends "base.html" %}

{% block content %}
<main class="container portfolio">
    <section class="portfolio-section">
        <h1>Portfolio</h1>
        <p class="section-subtitle">I miei lavori e progetti</p>
        
        <div class="portfolio-filters">
            <button class="filter-btn active" data-filter="all">Tutti</button>
            <button class="filter-btn" data-filter="web">Web Design</button>
            <button class="filter-btn" data-filter="development">Development</button>
            <button class="filter-btn" data-filter="ux">UX/UI</button>
        </div>
        
        <div class="portfolio-grid" id="portfolio-grid">
            <div class="portfolio-item" data-category="web">
                <div class="portfolio-image">
                    <img src="/static/assets/images/portfolio/project-1.jpg" alt="Progetto 1">
                    <div class="portfolio-overlay">
                        <h3>Progetto 1</h3>
                        <p>Web Design & Development</p>
                    </div>
                </div>
            </div>
            
            <div class="portfolio-item" data-category="development">
                <div class="portfolio-image">
                    <img src="/static/assets/images/portfolio/project-2.jpg" alt="Progetto 2">
                    <div class="portfolio-overlay">
                        <h3>Progetto 2</h3>
                        <p>Full Stack Development</p>
                    </div>
                </div>
            </div>
            
            <div class="portfolio-item" data-category="ux">
                <div class="portfolio-image">
                    <img src="/static/assets/images/portfolio/project-3.jpg" alt="Progetto 3">
                    <div class="portfolio-overlay">
                        <h3>Progetto 3</h3>
                        <p>UX/UI Design</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>


<script src="/static/js/portfolio.js"></script>
{% endblock %}
