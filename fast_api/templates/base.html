<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Parthenoweb{% endblock %}</title>
    <link rel="stylesheet" href="/static/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>

<body>

    <!-- ═══════════════════════════════════════ -->
    <!-- NAVBAR CON HAMBURGER                    -->
    <!-- ═══════════════════════════════════════ -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="/" class="nav-logo">
                <img src="/static/assets/images/logo-sfondato.webp" alt="Parthenoweb" class="logo-img">
            </a>

            <!-- ✅ HAMBURGER BUTTON -->
            <button class="hamburger" id="hamburger" aria-label="Apri menu" aria-expanded="false">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>

            <!-- ✅ NAV MENU -->
            <ul class="nav-menu" id="navMenu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/chi-siamo" class="nav-link">Chi Siamo</a></li>
                <li><a href="/#services" class="nav-link">Servizi</a></li>
                <li><a href="/contatti" class="nav-link">Contatti</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENUTO PAGINA -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Parthenoweb. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/js/splide.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- ✅ HAMBURGER MENU SCRIPT — QUI NEL BASE.HTML   -->
    <!-- ═══════════════════════════════════════════════ -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ── HAMBURGER TOGGLE ──
            var hamburger = document.getElementById('hamburger');
            var navMenu = document.getElementById('navMenu');

            if (hamburger && navMenu) {
                hamburger.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = hamburger.classList.toggle('active');
                    navMenu.classList.toggle('active');
                    hamburger.setAttribute('aria-expanded', isOpen);
                    document.body.classList.toggle('menu-open', isOpen);
                });

                // Chiudi cliccando su un link
                var navLinks = navMenu.querySelectorAll('.nav-link');
                navLinks.forEach(function (link) {
                    link.addEventListener('click', function () {
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                        document.body.classList.remove('menu-open');
                    });
                });

                // Chiudi cliccando fuori dal menu
                document.addEventListener('click', function (e) {
                    if (!navMenu.contains(e.target) && !hamburger.contains(e.target)) {
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                        document.body.classList.remove('menu-open');
                    }
                });
            }

            // ── AOS INIT ──
            if (typeof AOS !== 'undefined') {
                AOS.init({ once: true, duration: 800 });
            }

            // ── SPLIDE CAROUSEL ──
            var splideEl = document.getElementById('servicesCarousel');
            if (splideEl && typeof Splide !== 'undefined') {
                new Splide('#servicesCarousel', {
                    type: 'loop',
                    perPage: 3,
                    gap: '2rem',
                    pagination: true,
                    arrows: true,
                    autoplay: true,
                    interval: 4000,
                    breakpoints: {
                        1024: { perPage: 2 },
                        640: { perPage: 1 }
                    }
                }).mount();
            }

            // ── NAVBAR SCROLL ──
            window.addEventListener('scroll', function () {
                var navbar = document.getElementById('navbar');
                if (navbar) {
                    navbar.classList.toggle('scrolled', window.scrollY > 50);
                }
            });
        });
    </script>

</body>

</html>
